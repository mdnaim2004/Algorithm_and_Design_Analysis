conky.config = {
--==============================================================================

--  Created : 2022/Jun/21
--  This theme is for conky version 1.10.8 or newer
-- 
--  ELTANIN
--  ( A part of Draco Conky themes pack )
--
--  author  : Closebox73
--  version : 3.0
--  variant : Playerctl & Fahrenheit
--  license : Distributed under the terms of GPLv3

--==============================================================================

-- Size and Position settings --
  alignment = 'top_left',
  gap_x = 14,
  gap_y = 144,
  maximum_width = 240,
  minimum_height = 730,
  minimum_width = 240,
  
-- Text settings --
  use_xft = true,
  override_utf8_locale = true,
  font = 'Roboto:size=2',
  
-- Color Settings --
  default_color = '#FFFFFF',
  default_outline_color = 'white',
  default_shade_color = 'white',
  color1 = 'DC455E',
  color2 = '#FFFFFF',
  
-- Window Settings --
  background = false,
  border_width = 1,
  draw_blended = false,
  draw_borders = false,
  draw_graph_borders = true,
  draw_outline = false,
  draw_shades = false,
  own_window = true,
  own_window_colour = '000000',
  own_window_class = 'Conky',
  own_window_argb_visual = true,
  own_window_type = 'desktop',
  own_window_transparent = true,
  own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
  stippled_borders = 0,
  
-- Others --
  cpu_avg_samples = 2,
  net_avg_samples = 2,
  double_buffer = true,
  out_to_console = false,
  out_to_stderr = false,
  extra_newline = false,
  update_interval = 1,
  uppercase = false,
  use_spacer = 'none',
  show_graph_scale = false,
  show_graph_range = false,
}

conky.text = [[
${execi 300 ~/.config/conky/Eltanin/scripts/weather-v2.0.sh}\
${image ~/.config/conky/Eltanin/res/bg.png -p 0,10 -s 240x740}\
${image ~/.config/conky/Eltanin/res/bg1.png -p 5,364 -s 230x110}\
${image ~/.config/conky/Eltanin/res/face.jpg -p 12,374 -s 90x90}\
${offset 11}${voffset 17}${color}${font Economica:size=11}CPU${alignr 14}${cpu cpu0}%${font}
${offset 11}${voffset 5}${color1}${cpugraph 43,217}${font}
${offset 11}${voffset 7}${color}${font Economica:size=11}RAM${alignr 14}${memperc}%${font}
${offset 11}${voffset 5}${color1}${memgraph 43,217}${font}
${offset 11}${voffset 7}${color}${font Economica:size=11}Root ${goto 100}:${alignr 14}${fs_used_perc /}% of ${fs_size /}${font}
${offset 11}${voffset 5}${color1}${fs_bar 6,217 /}${font}
${offset 11}${voffset 7}${color}${font Economica:size=11}Home ${goto 100}:${alignr 14}${fs_used_perc /home}% of ${fs_size /home}${font}
${offset 11}${voffset 5}${color1}${fs_bar 6,217 /home}${font}
${offset 11}${voffset 25}${color}${font Economica:size=11}Wi-Fi ${goto 100}:${alignr 14}${execi 3 ~/.config/conky/Eltanin/scripts/ssid}${font}
${offset 11}${voffset 4}${color}${font Economica:size=11}Upload ${goto 100}:${alignr 14}${upspeed enp44s0} >>  ${totalup enp44s0}${font}
${offset 11}${voffset 4}${color}${font Economica:size=11}Download ${goto 100}:${alignr 14}${downspeed enp44s0} >>  ${totaldown enp44s0}${font}
${offset 11}${voffset 4}${color}${font Economica:size=11}IP Address ${goto 100}:${alignr 14}192.168.xx.xxx${font}
${offset 11}${voffset 4}${color}${font Economica:size=11}User Active ${goto 100}:${alignr 20}${user_number}${font}
${offset 110}${voffset 25}${color2}${font Economica:bold:size=11}USER${font}
${offset 110}${voffset 4}${color2}${font Economica:size=11}${execi 1200 lsb_release -sd}${font}
${offset 110}${voffset 4}${color2}${font Economica:size=11}${uptime}${font}
${offset 110}${voffset 4}${color2}${font Economica:size=11}----------------${font}
${offset 110}${voffset 3}${color2}${font Feather:size=11}${exec ~/.config/conky/Eltanin/scripts/playerctl-status.sh} ${font Economica:size=11}${exec ~/.config/conky/Eltanin/scripts/playerctl.sh}${font}
${offset 11}${voffset 33}${color1}${font Weathericons73:size=35}${execi 15 ~/.config/conky/Eltanin/scripts/weather-text-icon}${alignr 103}${voffset -3}${color}${font BPreplay:size=27}${execi 100 cat ~/.cache/weather.json | jq '.main.temp' | awk '{print int($1+0.5)}'}°${font BPreplay:size=18}C${font}
${alignr 14}${voffset -32}${color}${font Economica:size=11}${execi 100 cat ~/.cache/weather.json | jq -r '.name' | sed "s|\<.|\U&|g"}${font}
${alignr 14}${voffset 3}${color}${font Economica:size=11}${execi 100 cat ~/.cache/weather.json | jq -r '.weather[0].description' | sed "s|\<.|\U&|g"}${font}
${offset 11}${voffset 23}${color1}${font Feather:size=25}${alignr 103}${voffset -2}${color}${font BPreplay:size=27}${execi 5 du -hs ~/.local/share/Trash/files | awk '{print $1;}' | sed 's/.$//'}${font BPreplay:size=18}${execi 5 du -hs ~/.local/share/Trash/files | awk '{print $1;}' | tail -c 2}${font}
${alignr 14}${voffset -32}${color}${font Economica:size=11}Trash${font}
${alignr 14}${voffset 3}${color}${font Economica:size=11}${execi 5 ls ~/.local/share/Trash/files | wc -l} file inside${font}
${offset 11}${voffset 23}${color1}${font Feather:size=25}${alignr 103}${voffset -2}${color}${font BPreplay:size=27}${acpitemp}°${font BPreplay:size=18}C${font}
${alignr 14}${voffset -32}${color}${font Economica:size=11}${execi 1200 lscpu | grep "Model name:" | awk -F' ' '{print $3$4}'}${font}
${alignr 14}${voffset 3}${color}${font Economica:size=11}${execi 1200 lscpu | grep "CPU(s):" | awk -F' ' '{print $2}'} Core(s)${font}
${offset 11}${voffset 20}${color1}${font Feather:size=25}${alignr 125}${voffset -5}${color}${font BPreplay:size=20}${execi 2 amixer -D pulse get Master | grep '%' | head -n 1 | awk -F'[' '{print $2}' | awk -F'%' '{print $1}'}%${font}
${offset 126}${voffset -29}${color1}${font Feather:size=25}${alignr 14}${voffset -5}${color}${font BPreplay:size=10}${battery_percent BAT1}%${font}
]]
